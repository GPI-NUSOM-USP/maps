<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <title>MapLibre Fullscreen Map</title>

        <script src="pd4web.threads.js"></script>
        <script src="pd4web.js"></script>

        <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.css" />

        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
            }

            #map {
                width: 100vw;
                height: 100vh;
            }

            .overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 1000;
            }

            .modal {
                background: white;
                padding: 20px;
                border-radius: 8px;
                width: 400px;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
        </style>
    </head>

    <body>
        <!-- <div style="margin: 10px; display: flex; align-items: center; gap: 10px"> -->
        <!--     <button onclick="addNewAudio()">Add New Audio</button> -->
        <!--     <div id="positions">Click to get lat/log of that place</div> -->
        <!--     <div id="compass"></div> -->
        <!-- </div> -->

        <div id="map"></div>
        <script src="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.js"></script>

        <div id="audioOverlay" class="overlay" style="display: none">
            <div class="modal">
                <h3>New Áudio</h3>

                <label>Arquivo MP3 ou WAV</label>
                <input type="file" id="audioFile" accept=".mp3,.wav,audio/mpeg,audio/wav" />

                <label>Nome do Áudio</label>
                <input type="text" id="audioName" />

                <label>Latitude</label>
                <input type="number" id="latitude" step="any" />

                <label>Longitude</label>
                <input type="number" id="longitude" step="any" />

                <label>Source Number</label>
                <input type="number" id="sourceNumber" />

                <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px">
                    <button onclick="closeAudioModal()">Cancelar</button>
                    <button onclick="saveAudio()">Salvar</button>
                </div>
            </div>
        </div>

        <script>
            var Pd4Web = null;
            var Pd4WebModuleAsync = null;
            Pd4WebModule().then((module) => {
                Pd4WebModuleAsync = module;
                Pd4Web = new module.Pd4Web();
            });
        </script>
        <script src="map.js"></script>
    </body>
</html>
